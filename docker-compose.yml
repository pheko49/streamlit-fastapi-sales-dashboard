services:

  fastapi:
    build: .
    container_name: fastapi_container
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  streamlit:
    build: .
    container_name: streamlit_container
    command: streamlit run streamlit_app/Homepage.py --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - fastapi